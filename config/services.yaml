# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices.html#use-parameters-for-application-configuration
parameters:
    images_directory: '%kernel.project_dir%/public/uploads/images'   # ✅ Add this line
    ws_broadcast_url_default: ''
    ws_internal_secret_default: 'casaclick-ws-dev-secret'
    # Empty string when PAYMONGO_SECRET_KEY is unset (avoids null in PaymongoService)
    paymongo_secret_fallback: ''
    paymongo_dev_mock_default: '0'
    paymongo_default_uri: 'http://127.0.0.1:8000'

services:
    # default configuration for services in *this* file
    _defaults:
        autowire: true      # Automatically injects dependencies in your services.
        autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.

    # makes classes in src/ available to be used as services
    # this creates a service per class whose id is the fully-qualified class name
    App\:
        resource: '../src/'

    # add more service definitions when explicit configuration is needed
    # please note that last definitions always *replace* previous ones

    App\EventSubscriber\ActivitySubscriber:
        tags: ['doctrine.event_subscriber']

    App\EventListener\SecurityEventListener:
        tags:
            - { name: 'kernel.event_subscriber' }

    App\Service\GoogleIdTokenVerifier:
        arguments:
            $primaryClientId: '%env(trim:GOOGLE_OAUTH_CLIENT_ID)%'
            $mobileWebClientId: '%env(default::GOOGLE_MOBILE_WEB_CLIENT_ID)%'

    App\Service\PaymongoService:
        arguments:
            $secretKey: '%env(default:paymongo_secret_fallback:PAYMONGO_SECRET_KEY)%'
            $devMock: '%env(bool:default:paymongo_dev_mock_default:PAYMONGO_DEV_MOCK)%'
            $appBaseUrl: '%env(default:paymongo_default_uri:DEFAULT_URI)%'

    App\Controller\Api\MobileApiController:
        arguments:
            $wsBroadcastUrl: '%env(default:ws_broadcast_url_default:WS_BROADCAST_URL)%'

    App\Controller\WebRealtimeController:
        arguments:
            $wsBroadcastUrl: '%env(default:ws_broadcast_url_default:WS_BROADCAST_URL)%'

    # Realtime: POST to Socket.IO server after saving notifications (BinRazali npm run io:server)
    App\Service\RealtimeBroadcastService:
        arguments:
            $broadcastUrl: '%env(default:ws_broadcast_url_default:WS_BROADCAST_URL)%'
            $internalSecret: '%env(default:ws_internal_secret_default:WS_INTERNAL_SECRET)%'

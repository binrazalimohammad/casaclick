# Railway deploy config — CasaClick Symfony (websitedev)
# https://docs.railway.app/guides/php

[build]
builder = "nixpacks"
buildCommand = "composer install --no-dev --optimize-autoloader --no-interaction && php bin/console lexik:jwt:generate-keypair --skip-if-exists && php bin/console doctrine:migrations:migrate --no-interaction --allow-no-migration && php bin/console cache:clear --env=prod"

[deploy]
startCommand = "php -S 0.0.0.0:${PORT} -t public"
healthcheckPath = "/api/mobile/health"
healthcheckTimeout = 120
restartPolicyType = "on_failure"
